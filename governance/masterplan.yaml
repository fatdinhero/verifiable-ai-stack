constitution_articles:
- id: 1
  title: Privacy-First
  text: Zero-Retention ist unverueckbar. Keine Nutzerdaten verlassen das Geraet.
- id: 2
  title: Per-Sensor-Consent
  text: Jeder Sensorkanal individuell steuerbar. Kamera und Mikrofon default OFF.
- id: 3
  title: Local-First
  text: Keine Cloud-Abhaengigkeit. Alle Kernfunktionen muessen offline funktionieren.
- id: 4
  title: Morphologisches Gate
  text: Jede Funktionsentscheidung durchlaeuft VDI 2221/2222/2225 Konstruktionsprotokoll.
- id: 5
  title: ADR-Pflicht
  text: Keine Implementierung ohne dokumentierte Architekturentscheidung (ADR).
- id: 6
  title: Halal-Gate
  text: AAOIFI 6-Faktor-Screening auf alle Revenue-Streams.
- id: 7
  title: Zakat
  text: 2.5% automatische Berechnung auf alle Einnahmen.
- id: 8
  title: OTS-First
  text: OpenTimestamps-Anker vor jeder Veroeffentlichung.
- id: 9
  title: SAFE Mode
  text: Externes Backup vor jeder destruktiven Aktion.
- id: 10
  title: Golden ZIP
  text: Vollstaendige One-Shot-Deliverables.
- id: 11
  title: Halluzinations-Kennzeichnung
  text: Jede LLM-generierte Aussage MUSS mit Confidence-Score >= 0.8 ODER explizitem
    [Unverified]-Marker ausgegeben werden. Keine Erfindung von Normen, Zahlen, Paragrafen.
- id: 12
  title: Output-Format-Regeln
  text: 'Jeder Agent-Output MUSS strukturiert sein: { summary, detail, sources[],
    confidence }. Kein reiner Fliesstext bei sicherheitsrelevanten Ausgaben.'
- id: 13
  title: Glossar-Verweis
  text: Alle fachspezifischen Begriffe MUESSEN mit Verweis auf glossary.md versehen
    werden. Kein Term wird ohne Definition verwendet.
- id: 14
  title: Morphologisches Entscheidungsprotokoll
  text: Jede Entscheidung (Produkt, Architektur, Priorisierung) MUSS den morphologischen
    Kasten (VDI 2221) und die Bewertungsmatrix (VDI 2225) durchlaufen. Agenten liefern
    begruendete Empfehlungen, keine Optionslisten.
