- id: CNA
  name: COGNITUM Norm-Adapter
  version: 0.3.0
  status: proposed
  description: Generischer Norm-Pruefadapter mit Consent-Gate und zkVM-Proof
  layer: L3-Compliance
  inputs:
  - Merkmalsvektor von L4
  - Consent-State von L1
  - Sensordaten von L1
  outputs:
  - Konformitaetserklaerung
  - Pruefbericht
  - zkVM-Proof
  validation: Noch nicht implementiert
  links:
    upstream:
    - L4
    - L1
    downstream: []
  norms:
  - id: geg_71_abstand_grundstuecksgrenze
    description: 'GEG Paragraph 71: Abstand WP-Aussengeraet zur Grundstuecksgrenze
      >= 3.0m'
    sensor_requirements:
    - sensor: GPS
      required: true
      consent: false
    - sensor: Kamera
      required: true
      consent: true
    condition_yaml: gps_distance_to_boundary > 3.0
  - id: geg_71_schallschutz_tag
    description: 'GEG Paragraph 71 / TA Laerm: Tagpegel (6-22h) <= 50 dB(A) in Wohngebieten'
    sensor_requirements:
    - sensor: Mikrofon-Frequenzspektrum
      required: true
      consent: false
    condition_yaml: sound_pressure_db <= 50 AND context_time == 'day'
  - id: geg_71_schallschutz_nacht
    description: 'GEG Paragraph 71 / TA Laerm: Nachtpegel (22-6h) <= 35 dB(A)'
    sensor_requirements:
    - sensor: Mikrofon-Frequenzspektrum
      required: true
      consent: false
    condition_yaml: sound_pressure_db <= 35 AND context_time == 'night'
  - id: geg_72_effizienz_jaz
    description: 'GEG Paragraph 72: Jahresarbeitszahl (JAZ) >= 3.5 fuer Luft-WP'
    sensor_requirements:
    - sensor: Kamera
      required: true
      consent: true
    - sensor: Stromzaehler
      required: true
      consent: false
    condition_yaml: jaz_calculated >= 3.5
  - id: kfw_beg_vorlauftemperatur
    description: 'KfW-BEG: Max. Vorlauftemperatur <= 55 Grad C fuer Foerderfaehigkeit'
    sensor_requirements:
    - sensor: Temperatursensor
      required: true
      consent: false
    condition_yaml: flow_temp_max <= 55
  - id: kfw_beg_heizstab_sperrzeit
    description: 'KfW-BEG: Heizstab < 5% der Jahresbetriebsstunden'
    sensor_requirements:
    - sensor: Stromzaehler
      required: true
      consent: false
    condition_yaml: heating_rod_hours / total_hours < 0.05
  - id: ta_laerm_mischgebiet_tag
    description: 'TA Laerm: Immissionsrichtwert Mischgebiet tags <= 55 dB(A)'
    sensor_requirements:
    - sensor: Mikrofon-Frequenzspektrum
      required: true
      consent: false
    condition_yaml: ambient_noise_db <= 55 AND zone_type == 'mixed'
  - id: ta_laerm_reines_wohngebiet_nacht
    description: 'TA Laerm: Nachtpegel reines Wohngebiet <= 35 dB(A)'
    sensor_requirements:
    - sensor: Mikrofon-Frequenzspektrum
      required: true
      consent: false
    condition_yaml: ambient_noise_db <= 35 AND zone_type == 'residential' AND context_time
      == 'night'
  - id: vdi_4645_abstand_wand
    description: 'VDI 4645: Abstand WP-Aussengeraet zur Hauswand >= 0.5m'
    sensor_requirements:
    - sensor: Kamera
      required: true
      consent: true
    condition_yaml: camera_distance_wall >= 0.5
  - id: vdi_4645_abstand_oeffnungen
    description: 'VDI 4645: Keine Fenster/Tueren im Umkreis von 2m um Aussengeraet'
    sensor_requirements:
    - sensor: Kamera
      required: true
      consent: true
    - sensor: GPS
      required: true
      consent: false
    condition_yaml: camera_clear_zone >= 2.0
  - id: geg_74_dokumentation
    description: 'GEG Paragraph 74: Vollstaendige Dokumentation aller Pruefpunkte'
    sensor_requirements:
    - sensor: System-Uhr
      required: true
      consent: false
    condition_yaml: all_checks_passed == true AND report_complete == true
  - id: kfw_beg_waermebruecken
    description: 'KfW-BEG: Keine Waermebruecken > 0.2 W/(mK) an Schnittstellen'
    sensor_requirements:
    - sensor: Infrarot-Kamera
      required: true
      consent: true
    condition_yaml: thermal_bridge_max < 0.2
