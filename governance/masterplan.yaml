iso_23894_risks:
- id: RISK-01
  description: Sensor-Consent wird ignoriert oder umgangen
  probability: low
  impact: Datenschutzverletzung, DSGVO-Verstoss
  mitigation: Per-Sensor-Consent-Gate in L1 mit Default-OFF fuer Kamera und Mikrofon
  status: accepted
- id: RISK-02
  description: RF-Classifier in L2 produziert diskriminierende Kontextklassifikation
  probability: medium
  impact: Unfaire DayScore-Bewertung, Nutzervertrauensverlust
  mitigation: Primaer YAML-Regelwerk. RF nur optional. Fairness-Tests als Privacy-Invariante
  status: accepted
- id: RISK-03
  description: SQLite-Datenbank in L3 wird von Drittapp exfiltriert
  probability: medium
  impact: Vollstaendiger Episoden-Verlauf kompromittiert
  mitigation: SQLCipher-Verschluesselung. Android Scoped Storage. Kein Export ohne
    expliziten User-Intent
  status: proposed
- id: RISK-04
  description: DayScore-Algorithmus erzeugt psychischen Druck durch Gamification
  probability: medium
  impact: Nutzer-Wellbeing verschlechtert sich statt verbessert
  mitigation: Evening Coach als Guided Journaling statt Ranking. Keine Streaks. Kein
    Leaderboard
  status: accepted
- id: RISK-05
  description: Ollama-Modell halluziniert in Evening Coach Recommendations
  probability: high
  impact: Falsche Gesundheits- oder Verhaltensempfehlungen
  mitigation: LLM nur fuer Formulierung, nicht fuer medizinische Aussagen. Disclaimer.
    Fakten aus L4-Features. Art. 11 Halluzinations-Kennzeichnung
  status: accepted
- id: RISK-06
  description: zkVM-Proof in CNA ist zu rechenintensiv fuer Smartphone
  probability: medium
  impact: CNA-Konformitaetspruefung nur auf Desktop moeglich
  mitigation: Proof-Generierung optional asynchron. Fallback auf signierte YAML-Attestation
  status: proposed
- id: RISK-07
  description: 'Solo-Entwickler-Risiko: Bus-Faktor 1'
  probability: high
  impact: Projekt stirbt bei Ausfall
  mitigation: SSoT-Pipeline macht Repo selbstdokumentierend. CLAUDE.md und AGENTS.md
    als Onboarding. IP via OTS gesichert
  status: accepted
privacy_invariants:
- id: PRIV-01
  description: 'Zero-Retention: Keine Nutzerdaten verlassen das Geraet'
  test_tool: pytest
  test_method: 'Network-Monitor-Test: Kein HTTP-Egress waehrend 24h-Betrieb'
- id: PRIV-02
  description: 'Per-Sensor-Consent: Jeder Sensor individuell aktivierbar/deaktivierbar'
  test_tool: pytest
  test_method: 'Consent-Matrix-Test: Alle 8 Sensoren einzeln togglen, Pipeline laeuft
    weiter'
- id: PRIV-03
  description: Kamera und Mikrofon Default-OFF
  test_tool: pytest
  test_method: 'Fresh-Install-Test: Nach Erstinstallation beide Sensoren verifiziert
    OFF'
- id: PRIV-04
  description: DayGraph-Export nur durch expliziten User-Intent
  test_tool: pytest
  test_method: 'No-Auto-Export-Test: Kein DayGraph-File ohne User-Tap'
- id: PRIV-05
  description: SQLite-DB nicht durch Drittapps lesbar
  test_tool: adb
  test_method: 'Scoped-Storage-Test: adb shell versucht DB-Zugriff, wird verweigert'
- id: PRIV-06
  description: Keine biometrischen Daten in DayFeatures
  test_tool: pytest
  test_method: 'Feature-Schema-Test: DayFeatures enthalten nur focus/energy/social/movement,
    keine biometrischen Rohdaten'
- id: PRIV-07
  description: Audit-Trail enthaelt keine personenbezogenen Daten
  test_tool: pytest
  test_method: 'Audit-PII-Scan: Regex-Scan auf Email, Telefon, GPS-Koordinaten in
    audit_trail'
- id: PRIV-08
  description: 'DSAR-Funktion: Auskunft, Berichtigung, Loeschung innerhalb 30 Tage'
  test_tool: pytest
  test_method: 'API-Endpoint-Test: GET /dsar/export und DELETE /dsar/data mit Auth'
- id: PRIV-09
  description: Verschluesselung ruhend (SQLCipher) und im Transport (TLS 1.3)
  test_tool: pytest + openssl
  test_method: TLS-Config-Test plus SQLite PRAGMA key-Check
- id: PRIV-10
  description: 'Membership-Inference-Schutz: DayGraph-Export gegen MIA robust'
  test_tool: Hypothesis
  test_method: 'Property-based: Gegner-Modell aus 100 Episoden darf kein Re-Identifikationsmerkmal
    enthalten'
