name: Deploy to Hetzner

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 89.167.108.113
          username: root
          key: ${{ secrets.DEPLOY_KEY }}
          script: /opt/poisv/deploy.sh