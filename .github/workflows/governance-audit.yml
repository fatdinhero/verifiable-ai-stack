name: Governance Audit

on:
  push:
  pull_request:
  merge_group:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: governance-audit-${{ github.ref }}
  cancel-in-progress: true

jobs:
  governance-audit:
    name: Cognitum Governance Audit / governance-audit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install audit dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pyyaml numpy scipy pydantic

      - name: Run governance audit
        env:
          GOVERNANCE_AUDIT_HMAC_KEY: ${{ secrets.GOVERNANCE_AUDIT_HMAC_KEY }}
          REQUIRE_GOVERNANCE_AUDIT_SIGNATURE: ${{ vars.REQUIRE_GOVERNANCE_AUDIT_SIGNATURE || 'false' }}
        run: |
          set -euo pipefail
          SIGNATURE_FLAG=""
          if [ "$REQUIRE_GOVERNANCE_AUDIT_SIGNATURE" = "true" ]; then
            SIGNATURE_FLAG="--require-signature"
          fi
          python cognitum/scripts/export_governance_claims.py \
            --audit-dir "$RUNNER_TEMP/governance-audit" \
            --validators baseline \
            --validator-api-timeout 15 \
            --validator-api-retries 2 \
            --fail-on-reject \
            $SIGNATURE_FLAG

      - name: Validate generated report shape
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          report_path = Path(os.environ["RUNNER_TEMP"]) / "governance-audit" / "latest.json"
          report = json.loads(report_path.read_text(encoding="utf-8"))
          assert report["report_schema"] == "verifiable-ai-stack/governance-audit/v2.4"
          assert report["report_version"] == "2.4.0"
          assert report["quality_gate"]["passed"] is True
          assert report["summary"]["accepted"] is True
          assert report["metadata"]["git_commit"]
          assert report["metadata"]["report_id"]
          assert report["metadata"]["dependencies"]["agentsprotocol"]
          assert report["quality_gate"]["merge_check"]["github_merge_queue_event"] == "merge_group"
          assert report["integrity"]["report_payload_sha256"]
          print("governance-audit-ok", report["summary"])
          PY

      - name: Append audit summary
        if: always()
        run: |
          python - <<'PY' >> "$GITHUB_STEP_SUMMARY"
          import json
          import os
          from pathlib import Path

          report_path = Path(os.environ["RUNNER_TEMP"]) / "governance-audit" / "latest.json"
          if not report_path.exists():
              print("## Governance Audit\n\nReport was not generated.")
              raise SystemExit(0)
          report = json.loads(report_path.read_text(encoding="utf-8"))
          summary = report["summary"]
          print("## Governance Audit")
          print("")
          print(f"- Status: `{report['quality_gate']['status']}`")
          print(f"- Claims: `{summary['claim_count']}`")
          print(f"- Validators: `{summary['validator_count']}`")
          print(f"- mean_s_con: `{summary['mean_s_con']}`")
          print(f"- psi: `{summary['psi']}`")
          print(f"- Signature: `{report['integrity']['signature']['status']}`")
          print(f"- Report hash: `{report['integrity']['report_payload_sha256']}`")
          print(f"- Report ID: `{report['metadata']['report_id']}`")
          print(f"- Git commit: `{report['metadata']['git_commit']}`")
          print(f"- Required check: `{report['quality_gate']['merge_check']['required_status_check']}`")
          PY

      # Optional notification hook for regulated deployments:
      # Add SLACK_WEBHOOK_URL or TEAMS_WEBHOOK_URL as a repository secret and
      # replace this commented example with a hardened org-approved notifier.
      # Keep notification payloads free of secrets and private user data.
      #
      # - name: Notify failed governance gate
      #   if: failure()
      #   env:
      #     SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
      #   run: |
      #     test -z "$SLACK_WEBHOOK_URL" && exit 0
      #     curl -X POST -H 'Content-type: application/json' \
      #       --data '{"text":"Governance audit quality gate failed."}' \
      #       "$SLACK_WEBHOOK_URL"

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: governance-audit-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ runner.temp }}/governance-audit/
          retention-days: 90
