# AgentsProtocol local testnet — 3 validator nodes + embedding sidecar
#
# Topology:
#   embed        HTTP :8000  — sentence-transformers sidecar (all-MiniLM-L6-v2)
#   validator-1  P2P  :9000  RPC :8545  — seed node
#   validator-2  P2P  :9001  RPC :8546  — dials validator-1 as bootstrap
#   validator-3  P2P  :9002  RPC :8547  — dials validator-1 as bootstrap
#   seed         one-shot    — posts a signed claim to validator-1
#
# Usage:
#   docker compose up --build
#   curl http://localhost:8545/status
#   curl http://localhost:8545/get_block/<hash>

version: "3.9"

networks:
  ap-net:
    driver: bridge

# ---------------------------------------------------------------------------
# Embedding sidecar
# ---------------------------------------------------------------------------
services:
  embed:
    build:
      context: embed
      dockerfile: Dockerfile
    container_name: ap-embed
    networks: [ap-net]
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

# ---------------------------------------------------------------------------
# Validator nodes
# ---------------------------------------------------------------------------
  validator-1:
    build:
      context: src/validator
      dockerfile: Dockerfile
    container_name: ap-validator-1
    networks: [ap-net]
    ports:
      - "9000:9000"
      - "8545:8545"
    volumes:
      - ap-data-1:/data
    environment:
      AP_NODE_ID: validator-1
      AP_DATA_DIR: /data
      AP_LISTEN_ADDR: /ip4/0.0.0.0/tcp/9000
      AP_RPC_ADDR: "0.0.0.0:8545"
      AP_MIN_CLAIMS: "1"
      AP_BLOCK_TIMEOUT_SECS: "10"
      AP_TAU: "0.0"
      AP_EMBED_URL: "http://embed:8000/embed"
      RUST_LOG: "info"
    depends_on:
      embed:
        condition: service_healthy

  validator-2:
    build:
      context: src/validator
      dockerfile: Dockerfile
    container_name: ap-validator-2
    networks: [ap-net]
    ports:
      - "9001:9000"
      - "8546:8545"
    volumes:
      - ap-data-2:/data
    environment:
      AP_NODE_ID: validator-2
      AP_DATA_DIR: /data
      AP_LISTEN_ADDR: /ip4/0.0.0.0/tcp/9000
      AP_RPC_ADDR: "0.0.0.0:8545"
      AP_MIN_CLAIMS: "1"
      AP_BLOCK_TIMEOUT_SECS: "10"
      AP_TAU: "0.0"
      AP_EMBED_URL: "http://embed:8000/embed"
      AP_BOOTSTRAP_PEERS: "/ip4/ap-validator-1/tcp/9000"
      RUST_LOG: "info"
    depends_on:
      - validator-1

  validator-3:
    build:
      context: src/validator
      dockerfile: Dockerfile
    container_name: ap-validator-3
    networks: [ap-net]
    ports:
      - "9002:9000"
      - "8547:8545"
    volumes:
      - ap-data-3:/data
    environment:
      AP_NODE_ID: validator-3
      AP_DATA_DIR: /data
      AP_LISTEN_ADDR: /ip4/0.0.0.0/tcp/9000
      AP_RPC_ADDR: "0.0.0.0:8545"
      AP_MIN_CLAIMS: "1"
      AP_BLOCK_TIMEOUT_SECS: "10"
      AP_TAU: "0.0"
      AP_EMBED_URL: "http://embed:8000/embed"
      AP_BOOTSTRAP_PEERS: "/ip4/ap-validator-1/tcp/9000"
      RUST_LOG: "info"
    depends_on:
      - validator-1

# ---------------------------------------------------------------------------
# Seed: posts a signed claim to validator-1 after all nodes are up
# ---------------------------------------------------------------------------
  seed:
    image: python:3.11-slim
    container_name: ap-seed
    networks: [ap-net]
    depends_on:
      - validator-1
      - validator-2
      - validator-3
    volumes:
      - ./scripts:/scripts
    command: >
      sh -c "pip install -q cryptography requests &&
             sleep 5 &&
             python /scripts/seed_claim.py http://validator-1:8545"

volumes:
  ap-data-1:
  ap-data-2:
  ap-data-3:
