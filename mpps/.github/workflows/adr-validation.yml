name: ADR Validation & Evaluation

on:
  pull_request:
    paths:
      - 'docs/adr/**'
      - 'data/synthetic_adrs/**'

jobs:
  validate-adrs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate ADRs
        run: |
          pip install jsonschema
          python -c "
import json
from pathlib import Path
from jsonschema import validate
with open('data/adr_schema.json') as f:
    schema = json.load(f)
for f in Path('docs/adr').glob('*.md'):
    content = f.read_text()
    if 'VDI 2225' not in content and 'SPALTEN' not in content:
        print(f'❌ {f.name} fehlt methodische Referenz')
        exit(1)
print('✅ Alle ADRs validiert')
"
  evaluate:
    runs-on: ubuntu-latest
    needs: validate-adrs
    steps:
      - uses: actions/checkout@v4
      - name: Run Evaluator
        run: |
          pip install ollama
          python evaluator.py --batch data/synthetic_adrs/*.json || true
