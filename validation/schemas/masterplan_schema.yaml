version: str(required=True)
generated: str(required=True)
author: str(required=True)
organization: str(required=True)
repository: str(required=True)
constitution: str(required=True)
glossary: str(required=True)
adrs: list(include('adr'), required=False)
modules: list(include('module'), required=False)
iso_25010: list(include('iso25010_char'), required=False)
iso_23894_risks: list(include('risk'), required=False)
privacy_invariants: list(include('privacy_inv'), required=False)
exit_plan: list(include('exit_phase'), required=False)
audit_trail: list(include('audit_entry'), required=False)
---
adr:
  id: str(required=True)
  title: str(required=True)
  status: enum('proposed','accepted','deprecated','superseded',required=True)
  date: str(required=True)
  context: str(required=True)
  decision: str(required=True)
  consequences: str(required=True)
  links: include('links',required=False)
  superseded_by: str(required=False)
  morphologischer_kasten: any(required=False)
  bewertungsmatrix: any(required=False)
module:
  id: str(required=True)
  name: str(required=True)
  version: str(required=True)
  status: enum('proposed','accepted','deprecated','superseded',required=True)
  description: str(required=True)
  layer: str(required=True)
  inputs: list(str(),required=False)
  outputs: list(str(),required=False)
  validation: str(required=False)
  links: include('links',required=False)
  norms: list(include('norm_rule'),required=False)
  coverage: num(required=False)
  tests: int(required=False)
norm_rule:
  id: str(required=True)
  description: str(required=True)
  sensor_requirements: list(include('sensor_req'),required=False)
  condition_yaml: str(required=True)
sensor_req:
  sensor: str(required=True)
  required: bool(required=False)
  consent: bool(required=False)
iso25010_char:
  name: str(required=True)
  sub_characteristics: list(include('iso25010_sub'),required=False)
iso25010_sub:
  name: str(required=True)
  status: enum('proposed','accepted','deprecated','superseded',required=True)
  test_marker: str(required=False)
  notes: str(required=False)
risk:
  id: str(required=True)
  description: str(required=True)
  probability: enum('low','medium','high',required=True)
  impact: str(required=True)
  mitigation: str(required=True)
  status: enum('proposed','accepted','deprecated','superseded',required=True)
privacy_inv:
  id: str(required=True)
  description: str(required=True)
  test_tool: str(required=False)
  test_method: str(required=False)
exit_phase:
  phase: str(required=True)
  milestones: str(required=True)
  asset_sale: str(required=True)
  equity_round: str(required=True)
  comps: str(required=False)
audit_entry:
  timestamp: str(required=True)
  commit_sha: str(required=True)
  reason: str(required=True)
  adr_ref: str(required=False)
  actor: str(required=True)
  pipeline_url: str(required=False)
links:
  upstream: list(str(),required=False)
  downstream: list(str(),required=False)
