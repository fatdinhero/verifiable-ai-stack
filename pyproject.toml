[tool.pytest.ini_options]
minversion = "7.0"
addopts = "-q"
testpaths = [
  "cognitum/tests",
  "cognitum/validation/tests",
  "agentsprotocol/tests",
  "llmjson/tests",
]

[tool.ruff]
line-length = 100
target-version = "py310"
extend-exclude = [
  "agentsprotocol/src/validator/target",
  "civilization-operating-system/node_modules",
  "cognitum/daysensos-app/node_modules",
]

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B"]
ignore = [
  "E501",
]
